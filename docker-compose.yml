# docker-compose.yml
version: '3.9'
services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ridehail
      POSTGRES_USER: ridehail
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    command: npm run dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ridehail:secret@postgres:5432/ridehail
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-32-char-secret-replace-in-prod
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      OSRM_URL: http://osrm:5000/route/v1/driving
      DRIVER_MATCH_RADIUS_KM: 5
      DRIVER_ACCEPT_TIMEOUT_MS: 15000
    depends_on:
      - postgres
      - redis
      - osrm
    volumes:
      - ./backend:/app
      - /app/node_modules

  osrm:
    image: osrm/osrm-backend
    container_name: osrm
    ports:
      - '5000:5000'
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/map.osrm

volumes:
  pg_data:
  redis_data: